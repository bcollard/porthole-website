<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#93c0ff"/>
      <stop offset="100%" stop-color="#3b6fe0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#93c0ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#93c0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- background tile -->
  <rect width="64" height="64" rx="14" fill="#0b0d12"/>
  <!-- soft accent glow behind the porthole ring -->
  <circle cx="32" cy="32" r="22" fill="url(#glow)"/>
  <!-- the porthole ring -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="url(#g)" stroke-width="3.5"/>
  <!-- inner pupil -->
  <circle cx="32" cy="32" r="6" fill="url(#g)"/>
  <!-- four rivets -->
  <g fill="#93c0ff">
    <circle cx="32" cy="10" r="1.6"/>
    <circle cx="32" cy="54" r="1.6"/>
    <circle cx="10" cy="32" r="1.6"/>
    <circle cx="54" cy="32" r="1.6"/>
  </g>
</svg>
